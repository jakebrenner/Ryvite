<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryvite - Beautiful Event Invitations</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
:root { --coral:#E87758; --mustard:#E4BA42; --teal:#58A6A4; --sage:#9CB482; --orange:#ED923C; --cream:#FDF8F0; --dark:#3A3A3A; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Fredoka',sans-serif; background:var(--cream); color:var(--dark); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.landing { text-align:center; max-width:500px; }
.logo { font-family:'Playfair Display',serif; font-size:3rem; color:var(--coral); margin-bottom:8px; }
.tagline { color:#999; font-size:1.1rem; margin-bottom:40px; }
.coming-soon { display:inline-block; padding:12px 32px; background:linear-gradient(135deg,var(--teal),var(--sage)); color:white; border-radius:14px; font-size:1rem; font-weight:600; letter-spacing:1px; }
.footer { margin-top:60px; color:#ccc; font-size:0.85rem; }
</style>
</head>
<body>
<div class="landing">
  <h1 class="logo">Ryvite</h1>
  <p class="tagline">Beautiful event invitations, effortlessly.</p>
  <span class="coming-soon">Coming Soon</span>
  <p class="footer">Made with love by Dada</p>
</div>
</body>
</html>
