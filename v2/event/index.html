<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Invite — Ryvite</title>
  <meta name="description" content="You're invited! RSVP to this event on Ryvite.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --party-coral: #E94560; --blush-pop: #FF6B6B; --midnight: #1A1A2E; --cream: #FFFAF5; }
    html, body { font-family: 'Inter', sans-serif; background: #f9f9f9; color: var(--midnight); }
    .event-container { max-width: 100%; padding: 0; }
    #themeFrame { width: 100%; border: none; min-height: 600px; display: block; }
    .rsvp-section { max-width: 480px; margin: 40px auto; padding: 30px; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .rsvp-section h3 { font-size: 20px; margin-bottom: 20px; text-align: center; }
    .rsvp-form-group { margin-bottom: 16px; }
    .rsvp-form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
    .rsvp-form-group input, .rsvp-form-group select {
      width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 4px;
      font-family: 'Inter', sans-serif; font-size: 14px;
    }
    .rsvp-form-group input:focus, .rsvp-form-group select:focus { outline: none; border-color: var(--party-coral); box-shadow: 0 0 0 3px rgba(233,69,96,0.1); }
    .rsvp-submit { width: 100%; padding: 12px; background: var(--party-coral); color: white; border: none; border-radius: 4px; font-weight: 600; font-size: 14px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
    .rsvp-submit:hover { background: var(--blush-pop); transform: translateY(-1px); }
    .rsvp-submit:disabled { background: #ccc; cursor: not-allowed; transform: none; }
    .rsvp-success { padding: 20px; background: #d4edda; border-radius: 4px; color: #155724; text-align: center; font-weight: 600; }
    .calendar-buttons { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
    .calendar-btn { flex: 1; min-width: 120px; padding: 10px 16px; border: 1px solid #ddd; border-radius: 4px; background: white; color: var(--midnight); font-size: 12px; cursor: pointer; transition: all 0.2s; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 6px; font-family: 'Inter', sans-serif; }
    .calendar-btn:hover { border-color: var(--party-coral); color: var(--party-coral); }
    .loading { text-align: center; padding: 60px 20px; font-size: 16px; color: #666; }
    .error-msg { max-width: 480px; margin: 40px auto; padding: 20px; background: #f8d7da; border: 1px solid #f5c6cb; border-radius: 4px; color: #721c24; text-align: center; }
    .confetti-piece { position: fixed; font-size: 24px; pointer-events: none; animation: confetti-fall linear forwards; z-index: 9999; }
    @keyframes confetti-fall { 0% { opacity: 1; } 100% { transform: translateY(100vh) rotateZ(720deg); opacity: 0; } }
    .powered-by { text-align: center; padding: 20px; font-size: 12px; color: #999; }
    .powered-by a { color: #999; text-decoration: none; }
    .powered-by a:hover { color: var(--party-coral); }
    @media (max-width: 640px) { .calendar-buttons { flex-direction: column; } .calendar-btn { width: 100%; } }
  </style>
</head>
<body>
  <div class="event-container">
    <div id="loading" class="loading">Loading your invitation...</div>
    <div id="error" class="error-msg" style="display: none;"></div>
    <iframe id="themeFrame" style="display: none;"></iframe>
    <div id="rsvpSection" class="rsvp-section" style="display: none;"></div>
    <div id="poweredBy" class="powered-by" style="display: none;"><a href="/">Made with Ryvite</a></div>
  </div>

  <script>
    let currentEventData = null;

    async function loadEvent() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      const eventId = params.get('eid');

      if (!slug && !eventId) { showError('No event specified'); return; }

      try {
        const queryParams = slug ? 'slug=' + encodeURIComponent(slug) : 'eventId=' + encodeURIComponent(eventId);
        const res = await fetch('/api/v2/events?action=getPublic&' + queryParams);
        const result = await res.json();

        if (!result.success || !result.event) { showError('Event not found'); return; }

        currentEventData = result.event;
        document.title = result.event.title + ' — Ryvite';

        if (result.event.themeHtml && result.event.themeCss) {
          var config = result.event.themeConfig || {};
          var fontsImport = config.googleFontsImport || '';
          var iframe = document.getElementById('themeFrame');
          iframe.srcdoc = '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>* { margin:0; padding:0; box-sizing:border-box; } html, body { padding: 20px; background: #f9f9f9; } ' + fontsImport + '</style><style>' + result.event.themeCss + '</style></head><body>' + result.event.themeHtml + '</body></html>';
          iframe.style.display = 'block';
          iframe.onload = function() { try { iframe.style.height = Math.max(iframe.contentDocument.body.scrollHeight + 40, 600) + 'px'; } catch(e) {} };
        }

        var rsvpSection = document.getElementById('rsvpSection');
        rsvpSection.innerHTML = '<h3>RSVP</h3>'
          + '<div id="rsvpForm">'
          + '<div class="rsvp-form-group"><label for="rsvpName">Name</label><input type="text" id="rsvpName" placeholder="Your name" required></div>'
          + '<div class="rsvp-form-group"><label for="rsvpStatus">RSVP Status</label><select id="rsvpStatus" required><option value="">Select...</option><option value="yes">Yes, I\'ll be there!</option><option value="no">No, sorry</option><option value="maybe">Maybe</option></select></div>'
          + '<button class="rsvp-submit" id="rsvpSubmitBtn" onclick="submitRSVP()">Submit RSVP</button></div>'
          + '<div class="calendar-buttons">'
          + '<a class="calendar-btn" href="' + generateGoogleCalendarLink(result.event) + '" target="_blank">Google Calendar</a>'
          + '<a class="calendar-btn" href="' + generateOutlookLink(result.event) + '" target="_blank">Outlook</a>'
          + '<button class="calendar-btn" onclick="downloadICS()">Download .ics</button></div>';
        rsvpSection.style.display = 'block';
        document.getElementById('loading').style.display = 'none';
        document.getElementById('poweredBy').style.display = 'block';
      } catch (err) { console.error(err); showError('Error loading event'); }
    }

    async function submitRSVP() {
      var name = document.getElementById('rsvpName').value.trim();
      var status = document.getElementById('rsvpStatus').value;
      if (!name || !status) { alert('Please fill in your name and RSVP status'); return; }

      var btn = document.getElementById('rsvpSubmitBtn');
      btn.disabled = true; btn.textContent = 'Submitting...';

      try {
        var res = await fetch('/api/v2/events?action=rsvp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ eventId: currentEventData.id, name: name, status: status })
        });
        var result = await res.json();
        if (result.success) {
          document.getElementById('rsvpForm').innerHTML = '<div class="rsvp-success">RSVP received! Thanks for confirming, ' + escapeHtml(name) + '.</div>';
          triggerConfetti();
        } else { alert('Error submitting RSVP. Please try again.'); }
      } catch (err) { alert('Error submitting RSVP. Please try again.'); }
      finally { btn.disabled = false; btn.textContent = 'Submit RSVP'; }
    }

    function triggerConfetti() {
      var emojis = ['🎉','🎊','🎈','✨','🎁','🥳','💫','⭐'];
      for (var i = 0; i < 20; i++) {
        (function(j) {
          setTimeout(function() {
            var piece = document.createElement('div');
            piece.className = 'confetti-piece';
            piece.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            piece.style.left = Math.random() * 100 + 'vw';
            piece.style.top = '-30px';
            piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.body.appendChild(piece);
            setTimeout(function() { piece.remove(); }, 5000);
          }, j * 100);
        })(i);
      }
    }

    function generateGoogleCalendarLink(event) {
      var s = new Date(event.eventDate), e = event.endDate ? new Date(event.endDate) : new Date(s.getTime() + 3600000);
      return 'https://calendar.google.com/calendar/u/0/r/eventedit?' + new URLSearchParams({ action: 'TEMPLATE', text: event.title, dates: fmtDate(s) + '/' + fmtDate(e), location: event.locationName + (event.locationAddress ? ', ' + event.locationAddress : ''), details: event.description || '' }).toString();
    }

    function generateOutlookLink(event) {
      var s = new Date(event.eventDate), e = event.endDate ? new Date(event.endDate) : new Date(s.getTime() + 3600000);
      return 'https://outlook.live.com/calendar/0/deeplink/compose?' + new URLSearchParams({ path: '/calendar/action/compose', rru: 'addevent', subject: event.title, startdt: s.toISOString(), enddt: e.toISOString(), location: event.locationName + (event.locationAddress ? ', ' + event.locationAddress : ''), body: event.description || '' }).toString();
    }

    function downloadICS() {
      if (!currentEventData) return;
      var ev = currentEventData, s = new Date(ev.eventDate), e = ev.endDate ? new Date(ev.endDate) : new Date(s.getTime() + 3600000);
      var ics = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Ryvite//Event//EN','BEGIN:VEVENT','DTSTART:' + fmtDate(s),'DTEND:' + fmtDate(e),'SUMMARY:' + ev.title,'LOCATION:' + ev.locationName + (ev.locationAddress ? ', ' + ev.locationAddress : ''),'DESCRIPTION:' + (ev.description || '').replace(/\n/g, '\\n'),'END:VEVENT','END:VCALENDAR'].join('\r\n');
      var blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
      var link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = ev.title.replace(/[^a-z0-9]/gi, '-').toLowerCase() + '.ics';
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function fmtDate(d) { return d.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z'; }
    function showError(msg) { document.getElementById('error').textContent = msg; document.getElementById('error').style.display = 'block'; document.getElementById('loading').style.display = 'none'; }
    function escapeHtml(str) { var div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

    loadEvent();
  </script>
</body>
</html>
